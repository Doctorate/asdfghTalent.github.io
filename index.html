<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>热烈不欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
            transition: all 0.1s ease;
        }

        /* 混乱模式下的body */
        body.chaos-mode {
            background: linear-gradient(45deg, #ff0066, #ff6600, #ffcc00, #00ff66, #0066ff);
            background-size: 400% 400%;
            animation: chaosBg 0.5s ease infinite;
        }

        @keyframes chaosBg {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .container {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 32px 28px;
            transition: all 0.1s ease;
            position: relative;
        }

        /* 混乱模式下的容器 */
        body.chaos-mode .container {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            animation: containerShake 0.1s infinite;
        }

        @keyframes containerShake {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(3px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 3px) rotate(-1deg); }
            75% { transform: translate(1px, -1px) rotate(0.5deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        /* 混乱模式下的所有按钮和卡片 */
        body.chaos-mode .btn,
        body.chaos-mode .difficulty-btn,
        body.chaos-mode .decision-btn,
        body.chaos-mode .verify-action,
        body.chaos-mode .longpress-pill,
        body.chaos-mode .product-card,
        body.chaos-mode .module,
        body.chaos-mode .privacy-box {
            animation: chaosFloat 0.3s ease-in-out infinite !important;
        }

        @keyframes chaosFloat {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            33% { transform: translate(5px, -3px) rotate(2deg); }
            66% { transform: translate(-4px, 4px) rotate(-2deg); }
            100% { transform: translate(2px, -1px) rotate(1deg); }
        }

        /* 混乱模式下的文字闪烁 */
        body.chaos-mode .main-title,
        body.chaos-mode .empty-message,
        body.chaos-mode .author-quote,
        body.chaos-mode .author-name {
            animation: textFlash 0.2s infinite !important;
        }

        @keyframes textFlash {
            0% { opacity: 1; text-shadow: 0 0 0px red; }
            50% { opacity: 0.8; text-shadow: 0 0 8px red; }
            100% { opacity: 1; text-shadow: 0 0 0px blue; }
        }

        /* 混乱模式下的按钮额外效果 */
        body.chaos-mode .btn:hover {
            animation: chaosHover 0.1s infinite !important;
        }

        @keyframes chaosHover {
            0% { transform: scale(1.05) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1.05) rotate(-5deg); }
        }

        .page {
            display: none;
            animation: pageEnter 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .page.active {
            display: block;
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .main-title {
            font-size: 42px;
            font-weight: 620;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.92; }
        }
        .sub-title {
            font-size: 14px;
            color: #8d9aaa;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            background: #2c6e9e;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 590;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-align: center;
        }
        .btn:hover {
            background: #1f5780;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(31,87,128,0.2);
        }

        .difficulty-grid {
            display: flex;
            gap: 12px;
            margin: 24px 0;
            background: #f8fafd;
            padding: 6px;
            border-radius: 60px;
            border: 1px solid #eef2f8;
        }
        .difficulty-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 60px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #6c7e97;
            transition: all 0.25s;
            font-size: 15px;
        }
        .difficulty-btn.active {
            background: #2c6e9e;
            color: white;
            box-shadow: 0 2px 8px rgba(44,110,158,0.25);
            transform: scale(0.98);
        }
        .difficulty-btn:hover:not(.active) {
            background: rgba(44,110,158,0.08);
            color: #2c6e9e;
        }

        .slider-area {
            margin: 20px 0;
        }
        .slider-pill-container {
            background: #f1f5f9;
            border-radius: 60px;
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
        }
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: #cbd5e1;
            -webkit-appearance: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #2c6e9e;
            cursor: pointer;
        }
        .slider-status {
            margin-top: 12px;
            font-size: 13px;
            color: #7c8ea0;
            text-align: center;
        }
        .verify-action {
            margin-top: 16px;
            background: #2c6e9e;
            color: white;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
        }

        .longpress-area {
            margin: 30px 0;
            text-align: center;
            position: relative;
            min-height: 180px;
        }
        .longpress-container {
            position: relative;
            background: #f8fafd;
            border-radius: 80px;
            min-height: 100px;
        }
        .longpress-pill {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #f1f5f9;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            min-width: 180px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .longpress-pill.moving {
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .longpress-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2c6e9e, #4a9fd4);
            transition: width 0.05s linear;
            border-radius: 60px;
            z-index: 1;
        }
        .longpress-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 28px;
            font-weight: 500;
            color: #2c4c6e;
            white-space: nowrap;
        }
        .longpress-pill.active .longpress-content {
            color: white;
        }
        .longpress-status {
            margin-top: 20px;
            font-size: 13px;
            color: #7c8ea0;
            text-align: center;
        }
        .dodge-hint {
            margin-top: 12px;
            font-size: 12px;
            color: #c96f0e;
            text-align: center;
        }

        .privacy-box {
            background: #f8fafd;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #eef2f8;
        }
        .privacy-scroll {
            height: 360px;
            overflow-y: auto;
            padding-right: 8px;
            font-size: 13px;
            color: #4a627a;
            line-height: 1.7;
            scroll-behavior: smooth;
        }
        .privacy-scroll p {
            margin-bottom: 12px;
        }
        .privacy-footer {
            margin-top: 8px;
            font-size: 12px;
            color: #b91c1c;
            text-align: center;
        }
        .decision-buttons {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }
        .decision-btn {
            flex: 1;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.25s;
        }
        .decision-agree {
            background: #2c6e9e;
            color: white;
        }
        .decision-agree:hover {
            background: #1f5780;
            transform: translateY(-2px);
        }
        .decision-disagree {
            background: #f1f5f9;
            color: #8b5a2b;
            border: 1px solid #e2e8f0;
        }
        .decision-disagree:hover {
            background: #eef2f9;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        .modal-box {
            background: white;
            border-radius: 32px;
            padding: 32px 28px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: scaleIn 0.2s ease;
        }
        .modal-box h3 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        .modal-box p {
            color: #666;
            margin-bottom: 24px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-btn {
            padding: 10px 24px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .modal-btn-confirm {
            background: #2c6e9e;
            color: white;
        }
        .modal-btn-cancel {
            background: #f1f5f9;
            color: #666;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .roll-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: rollFadeIn 0.5s ease;
            cursor: pointer;
        }
        .giant-roll {
            font-size: 180px;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 8px 8px 0 #990000, 4px 4px 20px rgba(0,0,0,0.5);
            animation: shake 0.3s ease-in-out infinite, pulse 1.5s ease-in-out infinite;
            letter-spacing: 20px;
        }
        .roll-subtitle {
            margin-top: 30px;
            font-size: 20px;
            color: #ffaa88;
            text-shadow: 2px 2px 0 #552200;
            letter-spacing: 2px;
            animation: fadeInUp 0.8s ease;
        }
        .click-hint {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #888;
            animation: blink 1.5s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: #f0f3f8;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1000;
            animation: toastSlide 2s ease forwards;
        }
        @keyframes toastSlide {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        .empty-message {
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            color: #2c3e50;
            margin: 48px 0 24px;
            animation: floatText 3s ease-in-out infinite;
        }
        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .author-quote {
            text-align: center;
            font-size: 14px;
            color: #8d9aaa;
            margin: 24px 0 16px;
            font-style: italic;
            border-top: 1px solid #eef2f8;
            padding-top: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .author-quote:hover {
            color: #e67e22;
        }
        .author-name {
            text-align: center;
            font-size: 13px;
            color: #9aaebf;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            width: 100%;
        }
        .author-name:hover {
            color: #e67e22;
            transform: scale(1.02);
        }
        .spicy-btn {
            margin-top: 30px;
            background: #e67e22;
        }
        .spicy-btn:hover {
            background: #d35400;
        }

        /* 混乱模式开关提示 */
        .chaos-tip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffcc00;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body.chaos-mode .chaos-tip {
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="welcomePage" class="page active">
        <div class="title-area">
            <div class="main-title">热烈不欢迎</div>
        </div>
        <button class="btn" id="enterBtn">进入网站</button>
    </div>

    <div id="verifyPage" class="page">
        <div class="title-area">
            <div class="main-title" style="font-size: 28px;">人坤验证</div>
            <div class="sub-title">证明你不是人机</div>
        </div>
        <button class="btn" id="startVerifyBtn">开始验证</button>
        <div id="difficultyArea" style="margin-top: 28px; display: none;">
            <div class="difficulty-grid">
                <button class="difficulty-btn" data-diff="normal">普通</button>
                <button class="difficulty-btn" data-diff="unusual">不普通</button>
                <button class="difficulty-btn" data-diff="crazy">特别不普通</button>
            </div>
            <div id="diffContent"></div>
        </div>
    </div>

    <div id="finalPage" class="page">
        <div class="empty-message">这里什么都没有<br>你可以滚了！</div>
        <div class="author-quote">冤种自远方来，不亦乐乎，我就知道会有人点进去的</div>
        <div class="author-name" id="authorNameTrigger">作者：谢某人DipoleK13
        邮箱:3856360658@qq.com</div>
        <button class="btn spicy-btn" id="spicyBtn">🔥 我想看更劲爆的 🔥</button>
    </div>
</div>
<div class="chaos-tip" id="chaosTip">🎉 混乱模式已激活！网页正在蹦迪 🎉</div>

<script>
    const welcomePage = document.getElementById('welcomePage');
    const verifyPage = document.getElementById('verifyPage');
    const finalPage = document.getElementById('finalPage');
    const enterBtn = document.getElementById('enterBtn');
    const startVerifyBtn = document.getElementById('startVerifyBtn');
    const difficultyArea = document.getElementById('difficultyArea');
    const diffContent = document.getElementById('diffContent');
    const spicyBtn = document.getElementById('spicyBtn');
    const authorNameTrigger = document.getElementById('authorNameTrigger');
    const chaosTip = document.getElementById('chaosTip');

    let currentDifficulty = null;
    let verifySuccessFlag = false;
    let chaosModeActive = false;
    let chaosInterval = null;

    function showPage(pageId) {
        welcomePage.classList.remove('active');
        verifyPage.classList.remove('active');
        finalPage.classList.remove('active');
        if (pageId === 'welcome') welcomePage.classList.add('active');
        if (pageId === 'verify') verifyPage.classList.add('active');
        if (pageId === 'final') finalPage.classList.add('active');
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function createModal(title, message, onConfirm, onCancel) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-box">
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="modal-buttons">
                    <button class="modal-btn modal-btn-confirm" id="modalConfirm">继续</button>
                    <button class="modal-btn modal-btn-cancel" id="modalCancel">返回</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('modalConfirm').onclick = () => {
            overlay.remove();
            if (onConfirm) onConfirm();
        };
        document.getElementById('modalCancel').onclick = () => {
            overlay.remove();
            if (onCancel) onCancel();
        };
    }

    // 混乱模式 - 让整个网页蹦迪
    function activateChaosMode() {
        if (chaosModeActive) {
            // 如果已经激活，则关闭
            deactivateChaosMode();
            return;
        }
        chaosModeActive = true;
        document.body.classList.add('chaos-mode');
        showToast('🎉 混乱模式已开启！整个网页开始蹦迪！🎉');
        
        // 让所有可点击元素随机移动
        const allElements = document.querySelectorAll('.btn, .difficulty-btn, .decision-btn, .verify-action, .longpress-pill, .module, .privacy-box, .author-name, .author-quote');
        
        // 存储原始位置
        const originalPositions = new Map();
        allElements.forEach(el => {
            const rect = el.getBoundingClientRect();
            originalPositions.set(el, {
                top: rect.top,
                left: rect.left,
                transform: el.style.transform
            });
        });
        
        // 随机移动动画
        let moveInterval = setInterval(() => {
            if (!chaosModeActive) {
                clearInterval(moveInterval);
                return;
            }
            allElements.forEach(el => {
                const randomX = (Math.random() - 0.5) * 15;
                const randomY = (Math.random() - 0.5) * 15;
                const randomRotate = (Math.random() - 0.5) * 10;
                el.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${randomRotate}deg)`;
                el.style.transition = 'transform 0.1s ease';
            });
        }, 100);
        
        chaosInterval = moveInterval;
        
        // 5秒后自动关闭混乱模式（可选，也可以让用户再次点击关闭）
        setTimeout(() => {
            if (chaosModeActive) {
                deactivateChaosMode();
            }
        }, 8000);
    }
    
    function deactivateChaosMode() {
        if (!chaosModeActive) return;
        chaosModeActive = false;
        document.body.classList.remove('chaos-mode');
        
        if (chaosInterval) {
            clearInterval(chaosInterval);
            chaosInterval = null;
        }
        
        // 重置所有元素的transform
        const allElements = document.querySelectorAll('.btn, .difficulty-btn, .decision-btn, .verify-action, .longpress-pill, .module, .privacy-box, .author-name, .author-quote');
        allElements.forEach(el => {
            el.style.transform = '';
            el.style.transition = '';
        });
        
        showToast('我觉得这个很神圣');
    }

    // 巨大的滚字页面
    function showRollPage() {
        const rollDiv = document.createElement('div');
        rollDiv.className = 'roll-page';
        rollDiv.innerHTML = `
            <div class="giant-roll">滚</div>
            <div class="roll-subtitle">滚滚滚 看什么不合法的内容</div>
            <div class="click-hint">点击任意位置返回</div>
        `;
        document.body.appendChild(rollDiv);
        
        rollDiv.addEventListener('click', () => {
            rollDiv.remove();
            showToast('乖，别看那些乱七八糟的');
        });
        
        setTimeout(() => {
            if (document.body.contains(rollDiv)) {
                const hint = rollDiv.querySelector('.click-hint');
                if (hint) hint.style.opacity = '0.6';
            }
        }, 3000);
    }

    // 劲爆按钮流程
    spicyBtn.addEventListener('click', () => {
        createModal('🔞 年龄验证', '本内容包含劲爆元素，未满18岁禁止进入。\n请问您已满18周岁吗？', () => {
            createModal('⚠️ 友情提示', '即将展示的内容含有擦边成分，请确保您已做好准备。', () => {
                showRollPage();
            }, () => {
                showToast('已取消，你真是个正经人');
            });
        }, () => {
            showToast('年龄验证未通过，回去好好学习吧');
        });
    });

    // 点击作者名字触发混乱模式

        showPage('final');

            const slider = document.getElementById('sliderInput');

            const statusDiv = document.getElementById('sliderStatus');

                        statusDiv.innerHTML = '未验证';
                        statusDiv.style.color = '#7c8ea0';

            });
        } 
        else if (diff === 'unusual') {

            const REQUIRED_DURATION = 2000;
            let pressStartTime = 0, animationFrame = null, isComplete = false, isPressing = false;
            
            function getRandomPosition() {
                return { left: 15 + Math.random() * 70, top: 20 + Math.random() * 60 };
            }
            function dodge() {
                if (isComplete) return;
                const pos = getRandomPosition();
                pill.classList.add('moving');
                pill.style.left = pos.left + '%';
                pill.style.top = pos.top + '%';
                setTimeout(() => pill.classList.remove('moving'), 250);

            pill.style.left = '50%';
            pill.style.top = '50%';
            pill.style.transform = 'translate(-50%, -50%)';
            
            function onPointerEnter(e) {
                if (isComplete) return;
                dodge();
                statusDiv.innerHTML = '芜湖！本按钮先跑路了';

                    if (statusDiv.innerHTML === '芜湖！本按钮先跑路了') {
                        statusDiv.innerHTML = '等待验证';
                        statusDiv.style.color = '#7c8ea0';
                    }
                }, 800);
            }
            function updateProgress(now) {
                if (!pressStartTime || isComplete) return;
                const elapsed = now - pressStartTime;
                const progress = Math.min(100, (elapsed / REQUIRED_DURATION) * 100);
                progressBar.style.width = progress + '%';
                if (elapsed >= REQUIRED_DURATION && !isComplete) {
                    isComplete = true;
                    progressBar.style.width = '100%';
                    statusDiv.innerHTML = '✓ 验证通过！';
                    statusDiv.style.color = '#2e7d32';
                    pressText.innerHTML = '✓ 成功';
                    pill.classList.add('active');
                    setTimeout(() => completeVerification(), 300);
                    return;
                }
                animationFrame = requestAnimationFrame(updateProgress);
            }
            function startPress(e) {
                e.preventDefault();
                if (isComplete) return;
                pressStartTime = Date.now();
                isPressing = true;
                pill.classList.add('active');
                statusDiv.innerHTML = '长按中...';
                statusDiv.style.color = '#2c6e9e';
                pressText.innerHTML = '继续长按';
                animationFrame = requestAnimationFrame(updateProgress);
            }
            function endPress(e) {
                e.preventDefault();
                if (!isPressing || isComplete) {
                    if (animationFrame) cancelAnimationFrame(animationFrame);
                    isPressing = false;
                    return;
                }
                if (animationFrame) cancelAnimationFrame(animationFrame);
                progressBar.style.width = '0%';
                pill.classList.remove('active');
                statusDiv.innerHTML = '松手了，重新长按';
                statusDiv.style.color = '#c62828';
                pressText.innerHTML = '长按验证';
                isPressing = false;
                setTimeout(() => {
                    if (statusDiv.innerHTML !== '✓ 验证通过！') {
                        statusDiv.innerHTML = '等待验证';
                        statusDiv.style.color = '#7c8ea0';
                    }
                }, 1000);
            }
            pill.addEventListener('mouseenter', onPointerEnter);
            pill.addEventListener('touchstart', onPointerEnter);
            pill.addEventListener('mousedown', startPress);
            pill.addEventListener('mouseup', endPress);
            pill.addEventListener('mouseleave', endPress);
            pill.addEventListener('touchend', endPress);
            pill.addEventListener('touchcancel', endPress);
        } 
        else if (diff === 'crazy') {
            diffContent.innerHTML = `
                <div class="privacy-box">
                    <div class="privacy-scroll" id="privacyScroll">
                        <p><strong>📜 超级不正经隐私协议（特别不普通版）</strong></p>
                        <p>欢迎您来到这个“热烈不欢迎”的页面。在您同意本协议之前，请先深呼吸，因为接下来的内容可能会让您怀疑自己是不是人类。另外，本协议与您即将使用的“应用”毫无关系——事实上，我们甚至没有告诉您这个应用是干嘛的。</p>

                        <p><strong>第一条：蛋糕店理论</strong><br>您是否听过那首歌？“蛋糕店里卖蛋糕，奶茶店里喝奶茶”。本协议第一条明确规定：您在本站的一切行为，包括但不限于点击、滑动、长按，都将被系统记录并用于训练一只名为“坤坤”的人工智能。这只AI的主要工作是学会如何在你点击“同意”之前，提前把你的喜好告诉广告商。是的，你爱看猫视频，下一秒你就会收到猫粮广告——这不是巧合，是命运。</p>

                    </div>
                    <div class="privacy-footer" id="privacyWarning"></div>
                </div>
                <div class="decision-buttons">
                    <div class="decision-btn decision-agree" id="agreeBtn">同意</div>
                    <div class="decision-btn decision-disagree" id="disagreeBtn">不同意</div>
                </div>
            `;
            
            const scrollBox = document.getElementById('privacyScroll');
            const warningDiv = document.getElementById('privacyWarning');
            const agreeBtn = document.getElementById('agreeBtn');
            const disagreeBtn = document.getElementById('disagreeBtn');
            let startTime = Date.now();
            let hasScrolledToBottom = false;
            
            scrollBox.addEventListener('scroll', () => {
                const isBottom = scrollBox.scrollHeight - scrollBox.scrollTop <= scrollBox.clientHeight + 5;
                if (isBottom && !hasScrolledToBottom) {
                    hasScrolledToBottom = true;
                    warningDiv.innerHTML = '⚠️ 你不是人类！正常人类不会看完协议 ⚠️';
                    showToast('检测到滚动到底部，你不是人类');
                }
            });
            
            agreeBtn.addEventListener('click', () => {
                const elapsed = (Date.now() - startTime) / 1000;
                if (elapsed <= 5.0 && !hasScrolledToBottom) {

                    agreeBtn.innerText = '✓ 验证通过';
                    setTimeout(() => completeVerification(), 400);
